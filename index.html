<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Portal</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>

<div class="container">
  <div class="card" id="loginCard">
    <h2>Student Portal System</h2>
    <p class="subtitle">Login</p>
    <form id="loginForm">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="Enter your email" required>
      <label>Password</label>
      <div class="password-box">
        <input type="password" id="loginPassword" placeholder="Enter your password" required>
        <i class="fa fa-eye-slash togglePassword" data-target="loginPassword"></i>
      </div>
      <button type="submit">Login</button>
      <p id="loginClock"></p>
      <p class="register">Don't have an account? <a href="#" onclick="showRegister(); return false;">Register here</a></p>
    </form>
  </div>

  <div class="card" id="registerCard" style="display:none;">
    <h2>Student Portal System</h2>
    <p class="subtitle">Register</p>
    <form id="registerForm">
      <label>Full Name</label>
      <input type="text" id="regName" placeholder="Enter your full name" required>
      <label>Email</label>
      <input type="email" id="regEmail" placeholder="Enter your email" required>
      <label>Password</label>
      <div class="password-box">
        <input type="password" id="regPassword" placeholder="Create password" required>
        <i class="fa fa-eye-slash togglePassword" data-target="regPassword"></i>
      </div>
      <p id="passwordStrength"></p>
      <label>Confirm Password</label>
      <div class="password-box">
        <input type="password" id="confirmPassword" placeholder="Confirm password" required>
        <i class="fa fa-eye-slash togglePassword" data-target="confirmPassword"></i>
      </div>
      <button type="submit">Register</button>
      <p class="register">Already have an account? <a href="#" onclick="showLogin(); return false;">Login</a></p>
    </form>
  </div>

  <div class="card" id="dashboardCard" style="display:none;">
    <h2>Welcome to Student Portal</h2>
    <p class="subtitle">Your Dashboard</p>
    <p id="dynamicGreeting">Hello, student!</p>
    <p id="dashboardClock"></p>
    <button id="logoutBtn">Logout</button>
  </div>
</div>

<script>
  function setCard(cardId) {
    document.getElementById('loginCard').style.display = cardId === 'loginCard' ? 'block' : 'none';
    document.getElementById('registerCard').style.display = cardId === 'registerCard' ? 'block' : 'none';
    document.getElementById('dashboardCard').style.display = cardId === 'dashboardCard' ? 'block' : 'none';
  }

  function showRegister() { setCard('registerCard'); }
  function showLogin() { setCard('loginCard'); }

  document.querySelectorAll('.togglePassword').forEach(icon => {
    icon.addEventListener('click', () => {
      const input = document.getElementById(icon.dataset.target);
      if (!input) return;
      input.type = input.type === 'password' ? 'text' : 'password';
      icon.classList.toggle('fa-eye');
      icon.classList.toggle('fa-eye-slash');
    });
  });

  const regPasswordInput = document.getElementById('regPassword');
  const strengthEl = document.getElementById('passwordStrength');
  if (regPasswordInput && strengthEl) {
    regPasswordInput.addEventListener('input', () => {
      const len = regPasswordInput.value.length;
      strengthEl.innerText = len < 6 ? 'Strength: Weak' : len < 10 ? 'Strength: Medium' : 'Strength: Strong';
    });
  }

  function updateClock(id) {
    const el = document.getElementById(id);
    if (el) el.innerText = new Date().toLocaleTimeString();
  }
  setInterval(() => { updateClock('loginClock'); updateClock('dashboardClock'); }, 1000);

  const loginForm = document.getElementById('loginForm');
  loginForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value.trim();
    const pwd = document.getElementById('loginPassword').value;
    if (!email || !pwd) { alert('Please enter email and password'); return; }
    const name = email.split('@')[0] || 'Student';
    localStorage.setItem('loggedInUser', name);
    window.location.href = 'dashboard.html';
  });

  const registerForm = document.getElementById('registerForm');
  registerForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const pass = document.getElementById('regPassword').value;
    const confirm = document.getElementById('confirmPassword').value;
    if (!name || !email || !pass || !confirm) { alert('All fields required'); return; }
    if (pass !== confirm) { alert('Passwords do not match'); return; }
    alert('Registration successful! Please login.');
    registerForm.reset();
    if (strengthEl) strengthEl.innerText = '';
    showLogin();
  });

  function setGreeting(name) {
    const hour = new Date().getHours();
    const prefix = hour < 12 ? 'Good Morning' : hour < 18 ? 'Good Afternoon' : 'Good Evening';
    document.getElementById('dynamicGreeting').innerText = `${prefix}, ${name}! Welcome to your dashboard.`;
  }

  document.getElementById('logoutBtn').addEventListener('click', () => {
    loginForm.reset();
    setCard('loginCard');
  });
</script>

</body>
</html>
